register:
  post:
    tags:
      - Auth
    summary: Register a new user
    description: Creates a new user. The `idNumber` must be a valid South African ID (13 digits, Luhn‑valid). Date of birth and gender are auto‑extracted.
    operationId: register
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - password
              - firstName
              - lastName
              - phoneNumber
              - idNumber
              - role
            properties:
              email:
                type: string
                format: email
                example: john@example.com
              password:
                type: string
                format: password
                minLength: 8
                example: SecurePass123!
              firstName:
                type: string
                example: John
              lastName:
                type: string
                example: Doe
              phoneNumber:
                type: string
                pattern: '^\+[1-9]\d{1,14}$'
                example: '+27721234567'
              idNumber:
                type: string
                pattern: '^\d{13}$'
                example: '9501155123084'
              role:
                type: string
                enum: [borrower, lender, admin]
                example: borrower
              monthlyIncome:
                type: number
                example: 45000
    responses:
      '201':
        description: User registered successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/responses.yaml#/Success'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas.yaml#/User'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '409':
        description: Email or ID number already exists
        content:
          application/json:
            schema:
              $ref: '../components/responses.yaml#/Error'
              example:
                success: false
                error: Email already registered

login:
  post:
    tags:
      - Auth
    summary: Log in to the platform
    operationId: login
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - password
            properties:
              email:
                type: string
                format: email
                example: john@example.com
              password:
                type: string
                format: password
                example: SecurePass123!
    responses:
      '200':
        description: Login successful
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/responses.yaml#/Success'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        user:
                          $ref: '../components/schemas.yaml#/User'
                        tokens:
                          type: object
                          properties:
                            accessToken:
                              type: string
                            refreshToken:
                              type: string
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

refresh:
  post:
    tags:
      - Auth
    summary: Refresh access token
    operationId: refreshToken
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - refreshToken
            properties:
              refreshToken:
                type: string
    responses:
      '200':
        description: Tokens refreshed
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/responses.yaml#/Success'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        accessToken:
                          type: string
                        refreshToken:
                          type: string
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

logout:
  post:
    tags:
      - Auth
    summary: Log out user
    description: Invalidates the refresh token and logs out the current session.
    operationId: logout
    security:
      - bearerAuth: []
    responses:
      '200':
        $ref: '../components/responses.yaml#/Success'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'

forgotPassword:
  post:
    tags:
      - Auth
    summary: Request password reset
    operationId: forgotPassword
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
                example: john@example.com
    responses:
      '200':
        description: Reset link sent (token returned for testing)
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/responses.yaml#/Success'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        resetToken:
                          type: string

resetPassword:
  post:
    tags:
      - Auth
    summary: Reset password using token
    operationId: resetPassword
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
        description: Reset token from forgot‑password response
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - password
            properties:
              password:
                type: string
                format: password
                minLength: 8
    responses:
      '200':
        $ref: '../components/responses.yaml#/Success'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'