get:
  get:
    tags:
      - Balance
    summary: Get current balance
    operationId: getBalance
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Current balance
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/responses.yaml#/Success'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        available:
                          type: number
                        locked:
                          type: number
                        total:
                          type: number

deposit:
  post:
    tags:
      - Balance
    summary: Deposit funds
    operationId: depositFunds
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - amount
            properties:
              amount:
                type: number
                minimum: 1
    responses:
      '200':
        description: Deposit processed

withdraw:
  post:
    tags:
      - Balance
    summary: Withdraw funds
    operationId: withdrawFunds
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - amount
            properties:
              amount:
                type: number
                minimum: 1
    responses:
      '200':
        description: Withdrawal processed

transactions:
  get:
    tags:
      - Balance
    summary: List transactions
    operationId: listTransactions
    security:
      - bearerAuth: []
    parameters:
      - $ref: '../components/parameters.yaml#/limit'
      - $ref: '../components/parameters.yaml#/offset'
    responses:
      '200':
        description: List of transactions