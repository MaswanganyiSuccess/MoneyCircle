health:
  get:
    tags:
      - Health
    summary: Check service health
    description: Returns the service status – used by Render and GitHub Actions.
    operationId: healthCheck
    responses:
      '200':
        description: Service is healthy
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: ok
                environment:
                  type: string
                  example: production
                timestamp:
                  type: string
                  format: date-time

apiHealth:
  get:
    tags:
      - Health
    summary: Alias for /health
    operationId: apiHealthCheck
    responses:
      '200':
        $ref: '../components/responses.yaml#/HealthOK'