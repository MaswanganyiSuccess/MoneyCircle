<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2D5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A6B6B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle with Gradient -->
  <circle cx="50" cy="50" r="48" fill="url(#iconGrad)"/>
  
  <!-- Inner Ring -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#FFD966" stroke-width="3"/>
  
  <!-- Dollar Sign -->
  <text x="50" y="62" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#FFD966" text-anchor="middle">$</text>
</svg>