<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 130">
  <defs>
    <linearGradient id="dualGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F2D5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A6B6B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle with Gradient -->
  <circle cx="55" cy="65" r="50" fill="url(#dualGrad)"/>
  
  <!-- Inner Ring -->
  <circle cx="55" cy="65" r="38" fill="none" stroke="#FFD966" stroke-width="3"/>
  
  <!-- Dollar Sign -->
  <text x="55" y="76" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFD966" text-anchor="middle">$</text>
  
  <!-- Text - Money in Navy, Circle in Teal -->
  <text x="125" y="62" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700" fill="#0F2D5E">Money</text>
  <text x="125" y="100" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="300" fill="#1A6B6B">Circle</text>
  
  <!-- Dot Separator -->
  <circle cx="105" cy="65" r="4" fill="#FFD966"/>
  
  <!-- Tagline -->
  <text x="125" y="122" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#6B8B9C" letter-spacing="3">BORROW · INVEST · GROW</text>
</svg>