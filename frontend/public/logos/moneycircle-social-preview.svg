<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="socialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2D5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A6B6B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#socialGrad)"/>
  
  <!-- Decorative Circles -->
  <circle cx="950" cy="500" r="300" fill="#FFFFFF" opacity="0.03"/>
  <circle cx="200" cy="-50" r="250" fill="#FFD966" opacity="0.05"/>
  
  <!-- Main Icon -->
  <circle cx="250" cy="315" r="120" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="250" cy="315" r="100" fill="#FFFFFF" opacity="0.05"/>
  <circle cx="250" cy="315" r="80" fill="#FFFFFF" opacity="0.08"/>
  <text x="250" y="345" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#FFD966" text-anchor="middle">$</text>
  
  <!-- Main Text -->
  <text x="450" y="290" font-family="Inter, Arial, sans-serif" font-size="80" font-weight="700" fill="#FFFFFF">Money</text>
  <text x="450" y="370" font-family="Inter, Arial, sans-serif" font-size="80" font-weight="300" fill="#FFD966">Circle</text>
  
  <!-- Divider -->
  <line x1="450" y1="390" x2="900" y2="390" stroke="#FFD966" stroke-width="3" opacity="0.5"/>
  
  <!-- Tagline -->
  <text x="450" y="430" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="400" fill="#A8C4D0" letter-spacing="6">BORROW · INVEST · GROW</text>
  
  <!-- Bottom Text -->
  <text x="450" y="480" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="300" fill="#FFFFFF" opacity="0.5">Peer-to-Peer Lending Platform</text>
</svg>