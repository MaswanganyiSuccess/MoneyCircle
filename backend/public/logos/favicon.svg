<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2D5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A6B6B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded Square -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#favGrad)"/>
  
  <!-- Inner Ring -->
  <rect x="8" y="8" width="48" height="48" rx="10" fill="none" stroke="#FFD966" stroke-width="2.5"/>
  
  <!-- Dollar Sign -->
  <text x="32" y="44" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFD966" text-anchor="middle">$</text>
</svg>