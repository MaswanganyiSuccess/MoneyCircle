name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger from Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    # 🚀 FIX: Force Node.js 24 to bypass Node.js 20 deprecation
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5   # v5 supports Node.js 24

      - name: Set up Node.js
        uses: actions/setup-node@v5  # v5 supports Node.js 24
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Build TypeScript
        run: npm run build
        working-directory: backend

      - name: Trigger Render Deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK secret not set. Skipping deployment trigger."
            echo "ℹ️ Render auto-deploy will still happen if configured."
            exit 0
          fi
          echo "🚀 Triggering Render deployment..."
          curl -X POST "$RENDER_DEPLOY_HOOK"
          echo "✅ Deployment triggered successfully."

      - name: Wait for service to start
        run: sleep 15

      - name: Health Check
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL || 'https://moneycircle-api.onrender.com' }}
        run: |
          echo "🔍 Checking deployment health at ${DEPLOY_URL}/api/health"
          for i in {1..15}; do
            if curl -f -s -o /dev/null "${DEPLOY_URL}/api/health"; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "⏳ Waiting for service to respond... (attempt $i/15)"
            sleep 10
          done
          echo "❌ Health check failed after multiple attempts."
          exit 1