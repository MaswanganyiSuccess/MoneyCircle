name: Deploy

on:
  push:
    branches: [ main ]          # Triggers after a PR is merged
  workflow_dispatch:            # Manual trigger from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Build TypeScript
        run: npm run build
        working-directory: backend

      - name: Trigger Render Deploy (if configured)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK not set. Skipping (auto-deploy may still work)."
            exit 0
          fi
          echo "🚀 Triggering Render deployment..."
          curl -X POST "$RENDER_DEPLOY_HOOK"

      - name: Wait for service to start
        run: sleep 15

      - name: Health Check
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL || 'https://moneycircle-api.onrender.com' }}
        run: |
          echo "🔍 Checking deployment health at ${DEPLOY_URL}/health"
          for i in {1..15}; do
            if curl -f -s -o /dev/null "${DEPLOY_URL}/health"; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "⏳ Waiting for service... (attempt $i/15)"
            sleep 10
          done
          echo "❌ Health check failed after 15 attempts."
          exit 1